name: skill-creator
title: 技能创建器
category: 元技能
scope: external
status: active
version: 0.1.0
updated: 2026-05-13

purpose: Create new skills, modify and improve existing skills, and measure skill performance. Use when users want to create a skill from scratch, edit, or optimize an existing skill, run evals to test a skill, benchmark skill performance with variance analysis, or optimize a skill's description for better triggering accuracy.

relations:
  coordinates: []
  cooperates_with: [skill-distiller]
  upstream: []
  downstream: [skill-index, skill-graph]
  should_run_before: [skill-index, skill-graph]
  should_run_after: []
  supersedes: []
  overlaps_with: []

notes:
  - 与 skill-distiller 互补：skill-creator 从需求创造，skill-distiller 从经验提炼。
  - 产出新 skill 后，skill-index 负责分类路由，skill-graph 负责关系图更新。
