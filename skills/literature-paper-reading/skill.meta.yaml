notes:
  - 与 literature-to-math 同属 literature- 前缀家族。PDF 文本提取委托给 pdf-extract（三级策略：PyMuPDF → qpdf 解密 → OCR）。
  - 协作顺序：pdf-extract（提取文本）→ literature-paper-reading（全文理解）→ literature-to-math（数学方法提取）→ math-method-lib（入库）。
  - 论文阅读产出的方法名称可作为 math-method-lib 的候选输入。
